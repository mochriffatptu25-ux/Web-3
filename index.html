<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Greenhouse Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/firebase@10.8.1/firebase-app-compat.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/firebase@10.8.1/firebase-database-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        /* Pakai CSS dari index (4).html Anda sebelumnya */
        :root{ --bg0:#060f0a; --g5:#52c47a; --amber:#ffad3b; --txt:#dff5e8; --card:rgba(15,36,22,.72); --border:rgba(82,196,122,.13); }
        body{ font-family: sans-serif; background: var(--bg0); color: var(--txt); padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 15px; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--g5); background: rgba(82,196,122,0.1); }
        .card.on { border-color: var(--g5); box-shadow: 0 0 15px var(--g5); }
        .val { font-size: 2rem; font-weight: bold; display: block; }
        .label { color: #888; font-size: 0.8rem; text-transform: uppercase; }
        canvas { max-height: 200px; }
    </style>
</head>
<body>
    <h1>🌿 Greenhouse Monitor</h1>
    <p id="upd">Update: --:--:--</p>

    <div class="grid">
        <div class="card">
            <span class="label">Suhu Udara</span>
            <span class="val" id="vT">-- °C</span>
        </div>
        <div class="card">
            <span class="label">Kelembaban Tanah</span>
            <span class="val" id="vS">-- %</span>
        </div>
    </div>

    <h3>Kontrol Manual (Klik Kartu)</h3>
    <div class="grid">
        <div class="card" id="btn-peltier" onclick="toggle('Peltier')">
            <span class="label">Peltier & Fan</span>
            <span class="val" id="s-peltier">OFF</span>
        </div>
        <div class="card" id="btn-pompa" onclick="toggle('PompaAir')">
            <span class="label">Pompa Air</span>
            <span class="val" id="s-pompa">OFF</span>
        </div>
    </div>

    <div style="margin-top:20px;">
        <canvas id="mainChart"></canvas>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDq4cyOjlMICrkoHus1ZW5nTH-KEobSEs0",
            authDomain: "projek-3-97a68.firebaseapp.com",
            databaseURL: "https://projek-3-97a68-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "projek-3-97a68",
            appId: "1:981835425647:web:d06b87fa4b9c8a6bf36a9a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentPeltier = 0;
        let currentPompa = 0;

        // --- FUNGSI KONTROL ---
        function toggle(path) {
            let newVal = 0;
            if (path === 'Peltier') newVal = currentPeltier === 1 ? 0 : 1;
            if (path === 'PompaAir') newVal = currentPompa === 1 ? 0 : 1;
            
            db.ref('Control/' + path).set(newVal);
        }

        // --- UPDATE GRAFIK ---
        const ctx = document.getElementById('mainChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Suhu', data: [], borderColor: '#ffad3b' }] },
            options: { responsive: true }
        });

        // --- BACA DATA REALTIME ---
        db.ref('Monitoring').on('value', (snap) => {
            const data = snap.val();
            if(!data) return;

            // Update UI Sensor
            document.getElementById('vT').innerText = data.Suhu + " °C";
            document.getElementById('vS').innerText = data.Tanah + " %";
            document.getElementById('upd').innerText = "Update: " + new Date().toLocaleTimeString();

            // Update Status Tombol (Visual)
            currentPeltier = data.PeltierStatus;
            currentPompa = data.PompaStatus;

            updateCardUI('btn-peltier', 's-peltier', currentPeltier);
            updateCardUI('btn-pompa', 's-pompa', currentPompa);

            // Update Chart
            if(chart.data.labels.length > 10) chart.data.labels.shift(), chart.data.datasets[0].data.shift();
            chart.data.labels.push(new Date().toLocaleTimeString());
            chart.data.datasets[0].data.push(data.Suhu);
            chart.update();
        });

        function updateCardUI(cardId, textId, val) {
            const card = document.getElementById(cardId);
            const txt = document.getElementById(textId);
            if(val === 1) {
                card.classList.add('on');
                txt.innerText = "ON";
            } else {
                card.classList.remove('on');
                txt.innerText = "OFF";
            }
        }
    </script>
</body>
</html>
