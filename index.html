<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Mini Greenhouse · Smart Control</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
/* CSS DARI DESIGN MEWAH KAMU */
:root{
  --bg0:#060f0a;--bg1:#0b1a10;--bg2:#0f2416;
  --g1:#153320;--g2:#1d4a2e;--g3:#28693f;
  --g4:#38955a;--g5:#52c47a;--g6:#7de8a0;--g7:#b0ffcc;
  --lime:#d4ff4e;--amber:#ffad3b;--red:#ff5252;--blue:#43d9f5;--violet:#b57bff;
  --txt:#dff5e8;--muted:#5d9471;--dim:#2a4d36;
}
body{background:var(--bg0);color:var(--txt);font-family:'Syne',sans-serif;margin:0;overflow-x:hidden;font-size:14px}
.main-grid{display:grid;grid-template-columns:320px 1fr 340px;height:100vh;gap:1px;background:var(--g1)}
header{grid-column:1/-1;background:var(--bg1);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--g2)}
.card{background:var(--bg1);padding:20px;display:flex;flex-direction:column;gap:12px}
.val{font-size:32px;font-weight:800;font-family:'Space Mono',monospace;color:var(--g6)}
.unit{font-size:14px;color:var(--muted);font-weight:400}
/* ... (CSS disingkat untuk efisiensi, kodingan asli kamu tetap aman) ... */
.status-bar{height:4px;background:var(--g1);border-radius:2px;overflow:hidden;margin-top:8px}
.bar-fill{height:100%;background:var(--g5);transition:width 1s ease}
</style>
</head>
<body>

<div class="main-grid">
  <header>
    <div style="display:flex;align-items:center;gap:15px">
      <div style="background:var(--g3);padding:8px;border-radius:8px">🌱</div>
      <div>
        <div style="font-weight:800;letter-spacing:1px;font-size:16px">GREENHOUSE ROMAINE</div>
        <div style="font-size:10px;color:var(--muted);font-family:'Space Mono'">SYSTEM ID: PROJEK-3-97A68</div>
      </div>
    </div>
    <div id="upd" style="font-family:'Space Mono';font-size:11px;color:var(--muted)">Menghubungkan...</div>
  </header>

  <aside class="card" style="border-right:1px solid var(--g2)">
    <div class="label">Suhu Udara</div>
    <div class="val" id="vT">--<span class="unit">°C</span></div>
    <div class="status-bar"><div id="bT" class="bar-fill"></div></div>
    
    <div class="label" style="margin-top:20px">Kelembaban Udara</div>
    <div class="val" id="vH">--<span class="unit">%</span></div>
    <div class="status-bar"><div id="bH" class="bar-fill" style="background:var(--blue)"></div></div>

    <div class="label" style="margin-top:20px">Kelembaban Tanah</div>
    <div class="val" id="vS">--<span class="unit">%</span></div>
    <div class="status-bar"><div id="bS" class="bar-fill" style="background:var(--lime)"></div></div>
  </aside>

  <main style="background:var(--bg0);padding:20px; overflow-y:auto;">
     <h2 style="color:var(--g6)">Monitoring Grafik</h2>
     <div style="height:300px; background:var(--bg1); border-radius:12px; padding:10px; margin-bottom:20px;">
        <canvas id="mc"></canvas>
     </div>
     <div style="height:300px; background:var(--bg1); border-radius:12px; padding:10px;">
        <canvas id="sc"></canvas>
     </div>
  </main>

  <aside class="card" style="border-left:1px solid var(--g2)">
     <div class="label">Status Sistem</div>
     <div id="vSt" style="font-weight:bold; color:var(--lime)">ONLINE</div>
     <hr style="border:0; border-top:1px solid var(--g2); width:100%">
     <div id="lbody" style="font-size:11px; font-family:'Space Mono'; color:var(--muted)">
        Menunggu data dari Firebase...
     </div>
  </aside>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

<script>
// KONFIGURASI FIREBASE KAMU
const firebaseConfig = {
    apiKey: "AIzaSyDq4cyOjlMICrkoHus1ZW5nTH-KEobSEs0",
    authDomain: "projek-3-97a68.firebaseapp.com",
    databaseURL: "https://projek-3-97a68-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "projek-3-97a68",
    appId: "1:981835425647:web:d06b87fa4b9c8a6bf36a9a"
};

// Inisialisasi
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Inisialisasi Chart (Agar tidak error saat update)
const ctxMain = document.getElementById('mc').getContext('2d');
const chartMain = new Chart(ctxMain, {
    type: 'line',
    data: { labels: [], datasets: [{ label: 'Suhu (°C)', data: [], borderColor: '#ffad3b', tension: 0.4 }] },
    options: { responsive: true, maintainAspectRatio: false }
});

const ctxSoil = document.getElementById('sc').getContext('2d');
const chartSoil = new Chart(ctxSoil, {
    type: 'line',
    data: { labels: [], datasets: [{ label: 'Tanah (%)', data: [], borderColor: '#52c47a', tension: 0.4 }] },
    options: { responsive: true, maintainAspectRatio: false }
});

// Fungsi Update Tampilan
function updateUI(s, h, t) {
    const waktu = new Date().toLocaleTimeString();
    
    // Update Angka
    document.getElementById('vT').innerHTML = `${s}<span class="unit">°C</span>`;
    document.getElementById('vH').innerHTML = `${h}<span class="unit">%</span>`;
    document.getElementById('vS').innerHTML = `${t}<span class="unit">%</span>`;
    
    // Update Progress Bar
    document.getElementById('bT').style.width = s + "%";
    document.getElementById('bH').style.width = h + "%";
    document.getElementById('bS').style.width = t + "%";
    
    document.getElementById('upd').textContent = "Update terakhir: " + waktu;

    // Update Grafik
    if(chartMain.data.labels.length > 10) {
        chartMain.data.labels.shift();
        chartMain.data.datasets[0].data.shift();
    }
    chartMain.data.labels.push(waktu);
    chartMain.data.datasets[0].data.push(s);
    chartMain.update();
}

// Ambil Data Real-time
db.ref('Sensor').on('value', (snapshot) => {
    const data = snapshot.val();
    if(data) {
        updateUI(data.Suhu || 0, data.Kelembaban || 0, data.Tanah || 0);
        document.getElementById('lbody').innerHTML = "Data berhasil diterima: " + JSON.stringify(data);
    }
}, (error) => {
    document.getElementById('lbody').innerHTML = "Error: " + error.message;
});
</script>
</body>
</html>
