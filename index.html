<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Greenhouse Selada Romaine</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #2ecc71;
            --dark-green: #27ae60;
            --bg-color: #f0f4f7;
            --text-color: #2c3e50;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            background-color: var(--primary-green);
            color: white;
            width: 100%;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 40px 20px;
            max-width: 1000px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            width: 250px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .value {
            font-size: 2.5rem;
            font-weight: 600;
            margin: 10px 0;
            color: var(--dark-green);
        }

        .label {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7f8c8d;
        }

        footer {
            margin-top: auto;
            padding: 20px;
            color: #bdc3c7;
            font-size: 0.9rem;
        }

        /* Status Online/Offline */
        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #bbb;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
        .online { background-color: #2ecc71; }
    </style>
</head>
<body>

    <header>
        <h1>🌱 My Romaine Greenhouse</h1>
        <p><span class="status-dot online"></span> Sistem Terhubung Real-time</p>
    </header>

    <div class="container">
        <div class="card">
            <div class="icon">🌡️</div>
            <div class="label">Suhu Udara</div>
            <div class="value" id="suhu">--</div>
            <div class="label">Celcius</div>
        </div>

        <div class="card">
            <div class="icon">💧</div>
            <div class="label">Kelembaban Udara</div>
            <div class="value" id="kelembaban">--</div>
            <div class="label">Persen (%)</div>
        </div>

        <div class="card">
            <div class="icon">🪴</div>
            <div class="label">Kelembaban Tanah</div>
            <div class="value" id="tanah">--</div>
            <div class="label">Persen (%)</div>
        </div>
    </div>

    <footer>
        &copy; 2026 Proyek Selada Romaine IoT - Connected to GitHub & Firebase
    </footer>

    <script type="module">
        // Import Firebase SDK
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // Konfigurasi Firebase Anda
        const firebaseConfig = {
            apiKey: "AIzaSyDq4cyOjlMICrkoHus1ZW5nTH-KEobSEs0",
            authDomain: "projek-3-97a68.firebaseapp.com",
            databaseURL: "https://projek-3-97a68-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "projek-3-97a68",
            storageBucket: "projek-3-97a68.firebasestorage.app",
            messagingSenderId: "981835425647",
            appId: "1:981835425647:web:d06b87fa4b9c8a6bf36a9a",
            measurementId: "G-1J0MFRME5H"
        };

        // Inisialisasi Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Referensi ke node 'Sensor' di Firebase
        const sensorRef = ref(db, 'Sensor');

        // Mendengarkan perubahan data secara real-time
        onValue(sensorRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // Update tampilan web dengan data dari Firebase
                document.getElementById('suhu').innerText = data.Suhu !== undefined ? data.Suhu : "--";
                document.getElementById('kelembaban').innerText = data.Kelembaban !== undefined ? data.Kelembaban : "--";
                document.getElementById('tanah').innerText = data.Tanah !== undefined ? data.Tanah : "--";
                
                console.log("Data diterima:", data);
            } else {
                console.log("Data tidak ditemukan di folder 'Sensor'");
            }
        }, (error) => {
            console.error("Gagal membaca data:", error);
        });
    </script>
</body>
</html>
